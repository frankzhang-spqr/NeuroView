<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumor Detection</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.104.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ami.js@0.23.0/build/ami.min.js"></script>
</head>
<body>
    <h1>Tumor Detection and Analysis</h1>
    <div class="container">
        <div class="upload-section">
            <h2>Upload MRI Scans</h2>
            <p>Provide as many modalities as possible for the best result. If uploading only one, please use the <strong>t1c</strong> slot.</p>
            <div class="upload-slots">
                <div class="slot">
                    <label for="t1c_file">T1-weighted contrast-enhanced (t1c):</label>
                    <input type="file" id="t1c_file" class="file-input" accept=".nii,.nii.gz">
                </div>
                <div class="slot">
                    <label for="t1n_file">T1-weighted native (t1n):</label>
                    <input type="file" id="t1n_file" class="file-input" accept=".nii,.nii.gz">
                </div>
                <div class="slot">
                    <label for="t2f_file">T2-weighted FLAIR (t2f):</label>
                    <input type="file" id="t2f_file" class="file-input" accept=".nii,.nii.gz">
                </div>
                <div class="slot">
                    <label for="t2w_file">T2-weighted (t2w):</label>
                    <input type="file" id="t2w_file" class="file-input" accept=".nii,.nii.gz">
                </div>
            </div>
            <button id="upload-button">Analyze Scan</button>
        </div>
        <div id="results-section" style="display:none;">
            <h2>Analysis Results</h2>
            <div id="tumor-info"></div>
            <div class="views-container">
                <div id="view-2d">
                    <h3>2D Slice View</h3>
                    <div id="slice-container"></div>
                </div>
                <div id="view-3d">
                    <h3>3D Model View</h3>
                    <div id="canvas-container"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
